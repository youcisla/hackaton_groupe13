
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd5dI="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "docuflow_secret_2024"
    MONGO_URI: mongodb://mongo:27017
    OCR_SERVICE_URL: http://ocr-service:5001
    NER_SERVICE_URL: http://ner-service:5002
    OLLAMA_URL: http://ollama:11434
    API_BACKEND_URL: http://api-backend:4000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - uploads-data:/opt/airflow/uploads
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - docuflow-net

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - docuflow-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./data-lake:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_DATABASE: docuflow
    networks:
      - docuflow-net

  mongo-express:
    image: mongo-express:1.0.2
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    networks:
      - docuflow-net

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./ocr-service:/app
      - uploads-data:/app/uploads
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: docuflow
    depends_on:
      - mongo
    networks:
      - docuflow-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    networks:
      - docuflow-net

  ner-service:
    build:
      context: ./services/ner-service
      dockerfile: Dockerfile
    ports:
      - "5002:8001"
    volumes:
      - ./services/ner-service:/app
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: docuflow
    depends_on:
      - mongo
    networks:
      - docuflow-net

  airflow-init:
      <<: *airflow-common
      command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@docuflow.io"
      restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - uploads-data:/app/uploads
      - /app/node_modules
    environment:
      MONGO_URI: mongodb://mongo:27017/docuflow
      PORT: 4000
      OCR_SERVICE_URL: http://ocr-service:5001
      NER_SERVICE_URL: http://ner-service:5002
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASS: admin
    depends_on:
      - mongo
      - ocr-service
      - ner-service
    networks:
      - docuflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api-backend
    networks:
      - docuflow-net

volumes:
  postgres-data:
  mongo-data:
  uploads-data:
  ollama-data:

networks:
  docuflow-net:
    driver: bridge