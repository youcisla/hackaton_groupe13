services:

  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB:-docuflow}
      OCR_SERVICE_URL: http://ocr-service:5001
      NER_SERVICE_URL: http://ner-service:5002
    depends_on:
      - ocr-service
      - ner-service
    networks:
      - docuflow-net

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FLASK_DEBUG: 0
    networks:
      - docuflow-net

  ner-service:
    build:
      context: ./services/ner-service
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - docuflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-backend
    networks:
      - docuflow-net

networks:
  docuflow-net:
    driver: bridge
